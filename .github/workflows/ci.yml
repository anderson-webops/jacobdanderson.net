name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: 22.x
  NPM_VERSION: 11.12.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm version
        run: |
          npm i -g npm@${{ env.NPM_VERSION }}
          npm -v

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm version
        run: |
          npm i -g npm@${{ env.NPM_VERSION }}
          npm -v

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm version
        run: |
          npm i -g npm@${{ env.NPM_VERSION }}
          npm -v

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm run -w front-end test:unit -- --run

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm version
        run: |
          npm i -g npm@${{ env.NPM_VERSION }}
          npm -v

      - name: Install deps
        run: npm ci

      - name: Axe accessibility smoke checks
        run: npm run a11y

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pin npm version
        run: |
          npm i -g npm@${{ env.NPM_VERSION }}
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
