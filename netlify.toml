[build]
publish = "front-end/dist"
command = "npm run build"

[build.environment]
NODE_VERSION = "22"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/site.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/favicon.ico"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/favicons/*"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
